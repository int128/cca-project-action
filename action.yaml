name: cca-project-action
description: Aggregate claude-code-action issues to GitHub project
inputs:
  project-id:
    description: GitHub project ID
    required: true
  project-field-id-cost-usd:
    description: GitHub project field ID for cost USD
    required: true
  execution-file:
    description: Path to the execution file from claude-code-action
    required: true
  token:
    description: GitHub token
    required: true
    default: ${{ github.token }}
runs:
  using: 'node20'
  main: 'dist/index.js'
